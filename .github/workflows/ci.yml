name: CI

on:
  push:
  pull_request:

jobs:
  bash-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck bats

      - name: Run lint
        run: make lint

      - name: Run tests
        run: make test